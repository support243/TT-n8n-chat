<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TechnoTest — Support Chat</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #f5f4f0;
      --surface:     #ffffff;
      --border:      #e4e2db;
      --accent:      #2563eb;
      --accent-light:#eff4ff;
      --text:        #1a1917;
      --muted:       #8a8780;
      --user-bg:     #2563eb;
      --user-text:   #ffffff;
      --bot-bg:      #ffffff;
      --bot-border:  #e4e2db;
      --danger:      #dc2626;
      --radius:      14px;
      --shadow:      0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      line-height: 1.6;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100dvh;
      max-width: 720px;
      margin: 0 auto;
    }

    /* HEADER */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 22px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      box-shadow: var(--shadow);
      position: relative; z-index: 1;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }

    .avatar {
      width: 38px; height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Serif Display', serif;
      font-size: 18px; color: #fff; flex-shrink: 0;
    }
    .agent-name { font-weight: 600; font-size: 15px; color: var(--text); }
    .agent-status {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; color: var(--muted); margin-top: 1px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #22c55e;
      animation: pulse 2.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    .reset-btn {
      display: flex; align-items: center; gap: 6px;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 7px 13px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      transition: border-color .18s, color .18s, background .18s;
    }
    .reset-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
    .reset-btn svg { width: 14px; height: 14px; }

    /* MESSAGES */
    #messages {
      overflow-y: auto;
      padding: 24px 18px;
      display: flex; flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
      background: var(--bg);
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .empty-state {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; text-align: center; padding: 48px 24px;
      color: var(--muted); animation: fadeIn .4s ease;
    }
    .empty-icon {
      width: 52px; height: 52px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; margin-bottom: 4px;
      box-shadow: var(--shadow);
    }
    .empty-state h3 { font-size: 15px; font-weight: 600; color: var(--text); }
    .empty-state p  { font-size: 13px; color: var(--muted); }

    .msg {
      display: flex; flex-direction: column;
      max-width: 78%;
      animation: fadeUp .22s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 11px 16px;
      border-radius: var(--radius);
      font-size: 14.5px; line-height: 1.65;
      white-space: pre-wrap; word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--user-bg); color: var(--user-text);
      border-bottom-right-radius: 4px;
      box-shadow: 0 2px 8px rgba(37,99,235,.22);
    }
    .msg.bot .bubble {
      background: var(--bot-bg); color: var(--text);
      border: 1px solid var(--bot-border);
      border-bottom-left-radius: 4px;
      box-shadow: var(--shadow);
    }
    .msg.error .bubble { background: #fef2f2; border-color: #fecaca; color: var(--danger); }

    .meta { font-size: 11px; color: var(--muted); margin-top: 5px; padding: 0 4px; }

    .typing-bubble { display:flex; align-items:center; gap:5px; padding:14px 18px; }
    .typing-bubble span {
      width:7px; height:7px; border-radius:50%;
      background: var(--border); display:inline-block;
      animation: bounce 1.3s infinite;
    }
    .typing-bubble span:nth-child(2){animation-delay:.18s}
    .typing-bubble span:nth-child(3){animation-delay:.36s}
    @keyframes bounce {
      0%,60%,100%{transform:translateY(0);background:var(--border)}
      30%{transform:translateY(-5px);background:var(--accent)}
    }

    /* FOOTER */
    footer {
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 18px 16px;
      box-shadow: 0 -1px 4px rgba(0,0,0,.04);
    }
    .input-row { display:flex; gap:10px; align-items:flex-end; }

    #user-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14.5px; outline: none;
      resize: none; min-height: 44px; max-height: 130px;
      line-height: 1.5;
      transition: border-color .18s, box-shadow .18s;
    }
    #user-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    #user-input::placeholder { color: #b8b5ae; }

    #send-btn {
      background: var(--accent); border: none; border-radius: 10px;
      color: #fff; width: 44px; height: 44px;
      cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .18s, transform .1s, box-shadow .18s;
      box-shadow: 0 2px 8px rgba(37,99,235,.3);
    }
    #send-btn:hover  { opacity:.88; box-shadow:0 4px 12px rgba(37,99,235,.35); }
    #send-btn:active { transform:scale(.95); }
    #send-btn:disabled { opacity:.35; cursor:not-allowed; box-shadow:none; }

    .footer-hint { font-size:11px; color:#c0bdb8; margin-top:8px; text-align:center; }

    /* TOAST */
    #toast {
      position:fixed; bottom:80px; left:50%;
      transform:translateX(-50%) translateY(10px);
      background:#1a1917; color:#fff;
      font-size:13px; padding:8px 16px;
      border-radius:8px;
      opacity:0; pointer-events:none;
      transition:opacity .2s, transform .2s;
      white-space:nowrap;
    }
    #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  </style>
</head>
<body>
<div class="app">

  <header>
    <div class="header-left">
      <div class="avatar">T</div>
      <div>
        <div class="agent-name">TechnoTest Assistant</div>
        <div class="agent-status"><span class="dot"></span> Online</div>
      </div>
    </div>
    <button class="reset-btn" onclick="resetConversation()">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1.5 8A6.5 6.5 0 1 0 3.4 3.4"/>
        <path d="M1.5 3.5v3.5H5"/>
      </svg>
      New conversation
    </button>
  </header>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">💬</div>
      <h3>How can we help you today?</h3>
      <p>Send a message to get started.</p>
    </div>
  </div>

  <footer>
    <div class="input-row">
      <textarea id="user-input" rows="1"
        placeholder="Type your message…"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"></textarea>
      <button id="send-btn" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="10" y1="17" x2="10" y2="3"/>
          <polyline points="4 9 10 3 16 9"/>
        </svg>
      </button>
    </div>
    <div class="footer-hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </footer>

</div>
<div id="toast"></div>

<script>
  // ── CONFIGURATION ──────────────────────────────────────
  const WEBHOOK_URL = "https://n8n2.hsmart.xyz/webhook/test_chat";
  const API_KEY     = "ujUXZ6hRo270DlhU62vsl0,s7dwCtfkUsfs4NTg";
  // ──────────────────────────────────────────────────────

  let isWaiting = false;
  let sessionId = generateSessionId();

  const $ = id => document.getElementById(id);

  function generateSessionId() {
    return Array.from(crypto.getRandomValues(new Uint8Array(16)))
      .map(b => b.toString(16).padStart(2, '0')).join('');
  }

  function resetConversation() {
    sessionId = generateSessionId();
    $('messages').innerHTML = `
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">💬</div>
        <h3>How can we help you today?</h3>
        <p>Send a message to get started.</p>
      </div>`;
    showToast('New conversation started');
  }

  function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 130) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  async function sendMessage() {
    if (isWaiting) return;
    const input = $('user-input');
    const text  = input.value.trim();
    if (!text) return;

    const empty = $('empty-state');
    if (empty) empty.remove();

    appendMessage('user', text);
    input.value = '';
    input.style.height = 'auto';

    const typingEl = appendTyping();
    isWaiting = true;
    $('send-btn').disabled = true;

    try {
      const payload = [
        {
          action:    "sendMessage",
          sessionId: sessionId,
          chatInput: text
        }
      ];

      const res = await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-API-KEY':    API_KEY
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();
      typingEl.remove();

      const reply =
        (Array.isArray(data) && (data[0]?.output || data[0]?.text || data[0]?.message || data[0]?.chatInput)) ||
        data?.output   ||
        data?.text     ||
        data?.message  ||
        data?.response ||
        JSON.stringify(data, null, 2);

      appendMessage('bot', reply);

    } catch (err) {
      typingEl.remove();
      appendMessage('bot', 'Something went wrong. Please try again.', true);
      console.error(err);
    }

    isWaiting = false;
    $('send-btn').disabled = false;
    input.focus();
  }

  function appendMessage(role, text, isError = false) {
    const msgs = $('messages');
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}${isError ? ' error' : ''}`;

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;

    const meta = document.createElement('div');
    meta.className = 'meta';
    meta.textContent = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    wrap.appendChild(bubble);
    wrap.appendChild(meta);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  function appendTyping() {
    const msgs = $('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    wrap.innerHTML = `<div class="bubble typing-bubble"><span></span><span></span><span></span></div>`;
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;
    return wrap;
  }

  $('user-input').focus();
</script>
</body>
</html>
